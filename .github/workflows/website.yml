name: Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
  pull_request:
    branches: [main]
    paths:
      - "website/**"

defaults:
  run:
    working-directory: website

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npx wrangler deploy --assets=dist --compatibility-date 2026-03-16