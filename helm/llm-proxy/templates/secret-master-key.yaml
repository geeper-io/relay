{{/*
  Proxy master key secret — managed separately from API keys.

  The PROXY_MASTER_KEY is never accepted in plain text via values.yaml.
  Provide secrets.existingMasterKeySecret to bring your own, or let the
  chart generate and own it.

  Auto-generation logic:
    1. Secret already exists in the cluster  → reuse the stored value (stable upgrades)
    2. Secret does not exist yet             → generate randAlphaNum 32 (first install only)

  The helm.sh/resource-policy: keep annotation means `helm uninstall` leaves
  the secret in place, so a reinstall picks up the same key via lookup().
*/}}
{{- if not .Values.secrets.existingMasterKeySecret }}
{{- $secretName := printf "%s-master-key" (include "llm-proxy.fullname" .) }}
{{- $secretObj  := (lookup "v1" "Secret" .Release.Namespace $secretName) | default dict }}
{{- $secretData := (get $secretObj "data") | default dict }}
{{- $masterKey  := randAlphaNum 32 }}
{{- if hasKey $secretData "PROXY_MASTER_KEY" }}
  {{- $masterKey = index $secretData "PROXY_MASTER_KEY" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "llm-proxy.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  PROXY_MASTER_KEY: {{ $masterKey | quote }}
{{- end }}
