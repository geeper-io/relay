apiVersion: v2
name: relay
description: Geeper Relay — enterprise AI gateway with PII scrubbing, RAG, usage tracking, and Prometheus metrics
type: application
version: 0.1.0
appVersion: "1.0.0"

keywords:
  - llm
  - ai
  - proxy
  - gateway

dependencies:
  - name: postgresql
    version: ">=15.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled

  - name: redis
    version: ">=19.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
