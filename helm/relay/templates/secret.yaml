{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "relay.fullname" . }}
  labels:
    {{- include "relay.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY:         {{ .Values.secrets.openaiApiKey | quote }}
  ANTHROPIC_API_KEY:      {{ .Values.secrets.anthropicApiKey | quote }}
  AZURE_OPENAI_API_KEY:   {{ .Values.secrets.azureOpenaiApiKey | quote }}
  AZURE_OPENAI_ENDPOINT:  {{ .Values.secrets.azureOpenaiEndpoint | quote }}
  GOOGLE_CLIENT_ID:       {{ .Values.secrets.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET:   {{ .Values.secrets.googleClientSecret | quote }}
  AUTH_BASE_URL:          {{ .Values.secrets.authBaseUrl | quote }}
  LANGFUSE_PUBLIC_KEY:    {{ .Values.secrets.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY:    {{ .Values.secrets.langfuseSecretKey | quote }}
  LANGFUSE_HOST:          {{ .Values.secrets.langfuseHost | quote }}
  {{- if .Values.externalDatabase.url }}
  DATABASE_URL:           {{ .Values.externalDatabase.url | quote }}
  {{- end }}
{{- end }}
