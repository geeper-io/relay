apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "relay.fullname" . }}-config
  labels:
    {{- include "relay.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 8000
      workers: {{ .Values.config.workers }}
      log_level: {{ .Values.config.logLevel | default "info" | quote }}

    llm:
      default_model: {{ .Values.config.llm.defaultModel | quote }}
      allowed_models:
        {{- if .Values.config.llm.allowedModels }}
        {{- range .Values.config.llm.allowedModels }}
        - {{ . | quote }}
        {{- end }}
        {{- else }} []
        {{- end }}
      fallback_models:
        {{- if .Values.config.llm.fallbackModels }}
        {{- range .Values.config.llm.fallbackModels }}
        - {{ . | quote }}
        {{- end }}
        {{- else }} []
        {{- end }}
      model_aliases:
        {{- if .Values.config.llm.modelAliases }}
        {{- range $k, $v := .Values.config.llm.modelAliases }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
        {{- else }} {}
        {{- end }}
      per_model_max_tokens:
        {{- if .Values.config.llm.perModelMaxTokens }}
        {{- range $k, $v := .Values.config.llm.perModelMaxTokens }}
        {{ $k }}: {{ $v }}
        {{- end }}
        {{- else }} {}
        {{- end }}

    rag:
      enabled: {{ .Values.config.rag.enabled }}
      top_k: {{ .Values.config.rag.topK }}
      score_threshold: {{ .Values.config.rag.scoreThreshold }}
      embedding_model: {{ .Values.config.rag.embeddingModel | default "all-MiniLM-L6-v2" | quote }}
      context_prefix: "Relevant internal documentation:\n\n"
      context_separator: "\n\n---\n\n"

    pii:
      enabled: {{ .Values.config.pii.enabled }}
      score_threshold: {{ .Values.config.pii.scoreThreshold }}
      entities:
        {{- if .Values.config.pii.entities }}
        {{- range .Values.config.pii.entities }}
        - {{ . }}
        {{- end }}
        {{- else }} []
        {{- end }}

    rate_limiting:
      enabled: {{ .Values.config.rateLimiting.enabled }}
      {{- if .Values.redis.enabled }}
      backend: "redis"
      {{- else }}
      backend: {{ .Values.config.rateLimiting.backend | quote }}
      {{- end }}
      redis_url: ""
      defaults:
        requests_per_minute: {{ .Values.config.rateLimiting.defaults.requestsPerMinute | int }}
        tokens_per_minute: {{ .Values.config.rateLimiting.defaults.tokensPerMinute | int }}
        tokens_per_day: {{ .Values.config.rateLimiting.defaults.tokensPerDay | int }}

    content_policy:
      enabled: {{ .Values.config.contentPolicy.enabled }}
      max_input_tokens: {{ .Values.config.contentPolicy.maxInputTokens }}
      blocked_patterns:
        {{- if .Values.config.contentPolicy.blockedPatterns }}
        {{- range .Values.config.contentPolicy.blockedPatterns }}
        - {{ . | quote }}
        {{- end }}
        {{- else }} []
        {{- end }}

    cache:
      enabled: {{ .Values.config.cache.enabled }}
      {{- if .Values.redis.enabled }}
      type: "redis"
      {{- else }}
      type: {{ .Values.config.cache.type | quote }}
      {{- end }}
      ttl: {{ .Values.config.cache.ttl }}
      {{- if .Values.redis.enabled }}
      redis_host: {{ include "relay.redisHost" . | quote }}
      redis_port: 6379
      {{- else }}
      redis_host: "localhost"
      redis_port: 6379
      {{- end }}

    analytics:
      enabled: {{ .Values.config.analytics.enabled }}
      provider: {{ .Values.config.analytics.provider | quote }}
